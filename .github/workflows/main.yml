name: Ubuntu RDP 24h

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 1440 # 24 hours

    steps:
    - name: Update and Install Desktop Environment
      run: |
        sudo apt update
        sudo apt install -y xfce4 xfce4-goodies xrdp jq
        sudo adduser xrdp ssl-cert
        echo "xfce4-session" > ~/.xsession
        sudo systemctl enable xrdp
        sudo systemctl start xrdp
    - name: Create User 'Davi'
      run: |
        sudo useradd -m Davi
        echo "Davi:Vida@09871" | sudo chpasswd
        sudo usermod -aG sudo Davi
        sudo usermod -aG ssl-cert Davi
    - name: Install and Authenticate ngrok
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt update && sudo apt install ngrok
        ngrok config add-authtoken 30CFfgNYCMxlQYOf4joeNSaxe2O_3ki51dfeZofXGWBwbZSxQ
    - name: Start ngrok and Extract URL
      run: |
        nohup ngrok tcp 3389 --log=stdout > ngrok.log &
        echo "Waiting for ngrok to start..."
        for i in {1..10}; do
          URL=$(curl -s http://localhost:4040/api/tunnels | jq -r ".tunnels[0].public_url")
          if [ "$URL" != "null" ] && [ -n "$URL" ]; then
            echo "------------------------------------------------------------"
            echo "RDP CONNECTION DETAILS:"
            echo "Address: $URL"
            echo "User: Davi"
            echo "Password: Vida@09871"
            echo "------------------------------------------------------------"
            break
          fi
          sleep 2
        done
    - name: 24-Minute Keep-Alive Loop
      run: |
        while true; do
            sleep 1440 # 24 minutes
            echo "RDP Session Active (24min check): $(date)"
        done
