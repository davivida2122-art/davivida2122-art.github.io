name: Pterodactyl SSH Fixed

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 1440

    steps:
    - name: Prepare Environment
      run: |
        sudo apt update
        sudo apt install -y openssh-server curl gnupg jq iproute2
        sudo mkdir -p /var/run/sshd
        sudo sed -i 's/#PermitEmptyPasswords no/PermitEmptyPasswords yes/' /etc/ssh/sshd_config
        sudo sed -i 's/UsePAM yes/UsePAM no/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
    - name: Setup User
      run: |
        sudo useradd -m -s /bin/bash Davi
        sudo passwd -d Davi
        sudo usermod -aG sudo Davi
    - name: Install ngrok (Stable Repo)
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt update && sudo apt install -y ngrok
        ngrok config add-authtoken 30CFfgNYCMxlQYOf4joeNSaxe2O_3ki51dfeZofXGWBwbZSxQ
    - name: Run SSH Tunnel and Display Command
      run: |
        cat << 'EOF' > start.sh
        #!/bin/bash
        while true; do
            pkill ngrok
            sleep 2
            ngrok tcp 22 --log=stdout > ngrok.log &
            sleep 10
            URL=$(curl -s http://localhost:4040/api/tunnels | jq -r ".tunnels[0].public_url")
            
            if [ "$URL" == "null" ] || [ -z "$URL" ]; then
                echo "Failed to get ngrok URL. Retrying..."
                sleep 5
                continue
            fi

            HOST=$(echo $URL | cut -d'/' -f3 | cut -d':' -f1)
            PORT=$(echo $URL | cut -d':' -f3)
            
            echo ""
            echo "===================================================="
            echo "   COPY AND PASTE THE COMMAND BELOW TO ACCESS:"
            echo "===================================================="
            echo "ssh Davi@$HOST -p $PORT"
            echo "===================================================="
            echo ""
            
            # Monitor SSH connections
            while [ $(ss -t -a | grep -c "ESTAB.*ssh") -eq 0 ]; do sleep 5; done
            while [ $(ss -t -a | grep -c "ESTAB.*ssh") -gt 0 ]; do sleep 5; done
            
            echo "Connection closed. Restarting tunnel..."
        done
        EOF
        chmod +x start.sh
        ./start.sh
