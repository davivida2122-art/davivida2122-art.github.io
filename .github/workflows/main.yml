name: Debian 12 WARP Connector

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 1440

    steps:
    - name: Enable IP Forwarding
      run: |
        sudo sysctl -w net.ipv4.ip_forward=1
    - name: Run Debian 12 Environment
      run: |
        docker run -d --name debian_warp --privileged -p 2222:22 debian:bookworm sleep infinity
    - name: Setup Debian SSH (No Password)
      run: |
        docker exec debian_warp apt update
        docker exec debian_warp apt install -y openssh-server sudo curl gnupg jq iproute2 lsb-release
        docker exec debian_warp mkdir -p /var/run/sshd
        docker exec debian_warp sed -i 's/#PermitEmptyPasswords no/PermitEmptyPasswords yes/' /etc/ssh/sshd_config
        docker exec debian_warp sed -i 's/UsePAM yes/UsePAM no/' /etc/ssh/sshd_config
        docker exec debian_warp service ssh restart
    - name: Create User 'Davi' (No Password)
      run: |
        docker exec debian_warp useradd -m -s /bin/bash Davi
        docker exec debian_warp passwd -d Davi
        docker exec debian_warp usermod -aG sudo Davi
    - name: Install Cloudflare WARP
      run: |
        docker exec debian_warp sh -c 'curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg'
        docker exec debian_warp sh -c 'echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ bookworm main" | tee /etc/apt/sources.list.d/cloudflare-client.list'
        docker exec debian_warp apt update
        docker exec debian_warp apt install -y cloudflare-warp
    - name: Configure and Connect WARP
      run: |
        docker exec debian_warp warp-cli --accept-tos connector new eyJhIjoiYjRkYjYxMDY0NmU2Mjk0MTY5OTdhNDQ3NmY5ODljOWEiLCJ0IjoiMDNhOGUxZGMtNGI0OS00YWFkLWI0YzQtNjg2ODE0MTI2ZWJmIiwicyI6ImkvWHJFSldvTXB2RmUwSkRJbmNoM1daS2ZubWJSbjJNNGpZVGNuaEwvV3I1TWF5ZitPTmhtVEk4NnBrOHczVVNJdHoxekZYYysrRGV3ZlBDcW83SGNRPT0ifQ==
        docker exec debian_warp warp-cli --accept-tos connect
    - name: Display Status and Keep Alive
      run: |
        echo "===================================================="
        echo "   DEBIAN 12 - CLOUDFLARE WARP CONNECTOR ACTIVE"
        echo "===================================================="
        echo "User: Davi (NO PASSWORD)"
        echo "IP Forwarding: Enabled"
        echo "WARP Status: Connecting..."
        echo "===================================================="
        docker exec debian_warp warp-cli --accept-tos status
        docker logs -f debian_warp
        
