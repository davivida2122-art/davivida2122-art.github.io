name: Debian 12 Localtonet Direct SSH

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 1440

    steps:
    - name: Enable IP Forwarding
      run: sudo sysctl -w net.ipv4.ip_forward=1
    - name: Run Debian 12 Environment
      run: |
        docker run -d --name debian_local --privileged -p 2222:22 debian:bookworm sleep infinity
    - name: Setup SSH (No Password)
      run: |
        docker exec debian_local apt update
        docker exec debian_local apt install -y openssh-server sudo curl gnupg jq iproute2 wget unzip
        docker exec debian_local mkdir -p /var/run/sshd
        docker exec debian_local sed -i 's/#PermitEmptyPasswords no/PermitEmptyPasswords yes/' /etc/ssh/sshd_config
        docker exec debian_local sed -i 's/UsePAM yes/UsePAM no/' /etc/ssh/sshd_config
        docker exec debian_local service ssh restart
    - name: Create User 'Davi'
      run: |
        docker exec debian_local useradd -m -s /bin/bash Davi
        docker exec debian_local passwd -d Davi
        docker exec debian_local usermod -aG sudo Davi
    - name: Install and Start Localtonet
      run: |
        docker exec debian_local wget https://localtonet.com/download/localtonet-linux-x64.zip
        docker exec debian_local unzip localtonet-linux-x64.zip
        docker exec debian_local chmod +x localtonet
        docker exec -d debian_local sh -c './localtonet authtoken VLHzeFcvslYn7WAgORG935JEmbdXBPkZy'
        sleep 5
        docker exec -d debian_local sh -c './localtonet tcp 22 > /localtonet.log 2>&1'
    - name: Extract and Display SSH Command
      run: |
        echo "Aguardando Localtonet iniciar e gerar o link..."
        sleep 15
        # Localtonet logs are different from ngrok, we attempt to find the address in the log file
        # Or we provide instructions if the extraction is complex in the container
        echo "===================================================="
        echo "   DEBIAN 12 - LOCALTONET SSH ACCESS"
        echo "===================================================="
        echo "User: Davi (NO PASSWORD)"
        echo "===================================================="
        echo "Consulte o endereço no seu painel: https://localtonet.com/dashboard"
        echo "O comando será parecido com:"
        echo "ssh Davi@localtonet.com -p <PORTA_DO_PAINEL>"
        echo "===================================================="
    - name: Keep Alive
      run: docker logs -f debian_local
      
