name: CI

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 0 # Prevent job from timing out

    steps:
    - name: Download ngrok
      run: Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
    - name: Extract ngrok
      run: Expand-Archive ngrok.zip
    - name: Authenticate ngrok
      run: .\ngrok\ngrok.exe authtoken 30CFfgNYCMxlQYOf4joeNSaxe2O_3ki51dfeZofXGWBwbZSxQ
    - name: Enable Terminal Services
      run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
    - name: Enable Remote Desktop Firewall Rule
      run: Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
    - name: Set RDP User Authentication
      run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
    - name: Create Local User 'Davi'
      run: |
        $Password = ConvertTo-SecureString "Vida@09871" -AsPlainText -Force
        New-LocalUser -Name "Davi" -Password $Password -Description "RDP User"
        Add-LocalGroupMember -Group "Administrators" -Member "Davi"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "Davi"
    - name: Create ngrok_with_reload.ps1 script
      shell: powershell
      run: |
        $scriptContent = @'
        function Send-GraphicsReloadKey {
            # This command attempts to simulate Ctrl+Shift+Win+B.
            # In a headless GitHub Actions environment, direct keystroke simulation is complex.
            # This is a placeholder and might require a more advanced solution for actual effect.
            # For example, using devcon.exe or restarting the display driver service.
            Write-Host "Simulating Ctrl+Shift+Win+B (Graphics Driver Reload)"
            # [System.Windows.Forms.SendKeys]::SendWait("^+{HOME}") # This often requires an active UI session
            # As an alternative, we can log the action, as direct simulation is unlikely to work in headless CI.
        }

        # Start ngrok in the background
        Start-Process -FilePath ".\ngrok\ngrok.exe" -ArgumentList "tcp 3389" -NoNewWindow -PassThru | Out-Null

        Write-Host "ngrok tunnel started in background."

        # Loop to send keystrokes every 5 minutes
        while ($true) {
            Start-Sleep -Seconds 300 # 5 minutes
            Send-GraphicsReloadKey
            Write-Host "Waiting for 5 minutes before next graphics reload simulation..."
        }
        '@
        Set-Content -Path "ngrok_with_reload.ps1" -Value $scriptContent
    - name: Start ngrok tunnel and graphics reload loop
      run: powershell -File ngrok_with_reload.ps1
