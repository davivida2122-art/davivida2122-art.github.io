# Optimized GitHub Actions Workflow for Debian 12 + Pinggy SSH
# Target: ubuntu-22.04 (to bypass ubuntu-latest congestion)
# Features: No password, IP forwarding, automated tunnel
name: CI
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 1440
    steps:
      - name: sys_init
        run: sudo sysctl -w net.ipv4.ip_forward=1
      - name: container_init
        run: docker run -d --name debian_ptero --privileged -p 2222:22 debian:bookworm sleep infinity
      - name: pkg_install
        run: docker exec debian_ptero apt update && docker exec debian_ptero apt install -y openssh-server sudo curl gnupg jq iproute2
      - name: ssh_config_dir
        run: docker exec debian_ptero mkdir -p /var/run/sshd
      - name: ssh_config_nopass
        run: docker exec debian_ptero sed -i 's/#PermitEmptyPasswords no/PermitEmptyPasswords yes/' /etc/ssh/sshd_config
      - name: ssh_config_pam
        run: docker exec debian_ptero sed -i 's/UsePAM yes/UsePAM no/' /etc/ssh/sshd_config
      - name: ssh_service_start
        run: docker exec debian_ptero service ssh restart
      - name: user_setup
        run: docker exec debian_ptero useradd -m -s /bin/bash Davi && docker exec debian_ptero passwd -d Davi && docker exec debian_ptero usermod -aG sudo Davi
      - name: tunnel_init
        run: docker run -d --name pinggy_tunnel --net=host pinggy/pinggy -p 443 -R0:localhost:22 yU5bqrJJwh1+force+udp@us.free.pinggy.io
      - name: log_connection
        run: echo "ssh Davi@evqqh-13-87-231-100.run.pinggy-free.link -p 29272"
      - name: tunnel_status
        run: sleep 5 && docker logs pinggy_tunnel
      - name: process_keepalive
        run: docker logs -f debian_ptero
